# Docker Compose for kora
# Full-stack container orchestration

name: kora

services:
  server:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    container_name: kora-server
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/kora_dev
    restart: unless-stopped
    depends_on:
      - db
      - minio
    networks:
      - kora-network

  db:
    image: postgres:16-alpine
    container_name: kora-postgres
    environment:
      POSTGRES_DB: kora_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - kora_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - kora-network

  minio:
    image: minio/minio:latest
    container_name: kora-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - kora_minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - kora-network

networks:
  kora-network:
    driver: bridge

volumes:
  kora_postgres_data:
  kora_minio_data:
