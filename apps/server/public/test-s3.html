<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S3 / MinIO Test — Kora</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #18181f;
      --border: #2a2a35;
      --accent: #6c63ff;
      --accent-glow: rgba(108,99,255,.35);
      --success: #22c55e;
      --error: #ef4444;
      --warn: #f59e0b;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --radius: 12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; }
    header h1 span { color: var(--accent); }
    header p { color: var(--muted); margin-top: .4rem; font-size: .9rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 1.25rem;
      max-width: 1000px;
      margin: 0 auto;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.4rem;
      display: flex;
      flex-direction: column;
      gap: .9rem;
    }
    .card h2 { font-size: 1rem; font-weight: 600; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      font-size: .75rem;
      font-weight: 600;
      padding: .2rem .6rem;
      border-radius: 99px;
      text-transform: uppercase;
    }
    .badge.get  { background: rgba(34,197,94,.15); color: var(--success); }
    .badge.post { background: rgba(108,99,255,.15); color: var(--accent); }
    .badge.del  { background: rgba(239,68,68,.15);  color: var(--error); }

    button {
      all: unset;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      font-size: .875rem;
      font-weight: 600;
      padding: .6rem 1.2rem;
      border-radius: 8px;
      text-align: center;
      transition: opacity .15s, box-shadow .15s;
    }
    button:hover { opacity: .88; box-shadow: 0 0 16px var(--accent-glow); }
    button:active { opacity: .75; }

    input[type="file"], input[type="text"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: .5rem .8rem;
      font-size: .875rem;
      width: 100%;
      font-family: inherit;
    }
    input:focus { outline: 2px solid var(--accent); border-color: transparent; }

    .log {
      background: #0b0b0f;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .75rem 1rem;
      font-size: .8rem;
      font-family: monospace;
      line-height: 1.6;
      max-height: 180px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .ok   { color: var(--success); }
    .err  { color: var(--error); }
    .info { color: var(--accent); }

    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--muted);
      display: inline-block;
      margin-right: .5rem;
      transition: background .3s;
    }
    .status-dot.ok  { background: var(--success); box-shadow: 0 0 8px var(--success); }
    .status-dot.err { background: var(--error);   box-shadow: 0 0 8px var(--error); }

    #file-list { list-style: none; display: flex; flex-direction: column; gap: .4rem; }
    #file-list li {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: .4rem .75rem;
      font-size: .8rem; gap: .5rem;
    }
    #file-list li span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #file-list li .del-btn {
      background: rgba(239,68,68,.15); color: var(--error);
      padding: .2rem .6rem; font-size: .75rem; border-radius: 6px;
    }
    #file-list li .dl-btn {
      background: rgba(108,99,255,.15); color: var(--accent);
      padding: .2rem .6rem; font-size: .75rem; border-radius: 6px;
    }
  </style>
</head>
<body>
  <header>
    <h1>S3 / <span>MinIO</span> Test</h1>
    <p>Connected to: <code id="endpoint-label">http://localhost:9000</code></p>
    <p style="margin-top:.6rem">
      <span class="status-dot" id="health-dot"></span>
      <span id="health-text" style="font-size:.85rem;color:var(--muted)">Checking bucket…</span>
    </p>
  </header>

  <div class="grid">

    <!-- Health Check -->
    <div class="card">
      <div style="display:flex;align-items:center;gap:.6rem">
        <span class="badge get">GET</span>
        <h2>Health Check</h2>
      </div>
      <button type="button" id="btn-health">Run Health Check</button>
      <div class="log" id="log-health">Waiting…</div>
    </div>

    <!-- List Files -->
    <div class="card">
      <div style="display:flex;align-items:center;gap:.6rem">
        <span class="badge get">GET</span>
        <h2>List Files</h2>
      </div>
      <button type="button" id="btn-list">Refresh List</button>
      <ul id="file-list"></ul>
    </div>

    <!-- Upload -->
    <div class="card">
      <div style="display:flex;align-items:center;gap:.6rem">
        <span class="badge post">POST</span>
        <h2>Upload File</h2>
      </div>
      <input type="file" id="upload-input" />
      <button type="button" id="btn-upload">Upload</button>
      <div class="log" id="log-upload">Waiting…</div>
    </div>

    <!-- Presign Upload -->
    <div class="card">
      <div style="display:flex;align-items:center;gap:.6rem">
        <span class="badge get">GET</span>
        <h2>Presigned Upload URL</h2>
      </div>
      <button type="button" id="btn-presign">Generate URL</button>
      <div class="log" id="log-presign">Waiting…</div>
    </div>

  </div>

  <script>
    const API = 'http://localhost:3000/s3-test';

    const $ = id => document.getElementById(id);
    const log = (id, msg, cls='info') => {
      const el = $(id);
      el.innerHTML = `<span class="${cls}">${typeof msg === 'string' ? msg : JSON.stringify(msg, null, 2)}</span>`;
    };

    // Health
    async function health() {
      try {
        const r = await fetch(`${API}/health`);
        const d = await r.json();
        log('log-health', JSON.stringify(d, null, 2), d.status === 'ok' ? 'ok' : 'err');
        $('health-dot').className = `status-dot ${d.status === 'ok' ? 'ok' : 'err'}`;
        $('health-text').textContent = d.status === 'ok' ? 'Bucket reachable ✓' : 'Error: ' + d.message;
        $('health-text').style.color = d.status === 'ok' ? 'var(--success)' : 'var(--error)';
      } catch(e) {
        log('log-health', e.message, 'err');
        $('health-dot').className='status-dot err';
        $('health-text').textContent = 'Server unreachable';
        $('health-text').style.color = 'var(--error)';
      }
    }

    // List
    async function listFiles() {
      try {
        const r = await fetch(`${API}/list`);
        const d = await r.json();
        const ul = $('file-list');
        ul.innerHTML = '';
        if (!d.files?.length) {
          ul.innerHTML = '<li style="color:var(--muted);border:none;background:transparent">No files yet</li>';
          return;
        }
        for (const f of d.files) {
          const li = document.createElement('li');
          li.innerHTML = `
            <span title="${f.key}">${f.key}</span>
            <span style="color:var(--muted);white-space:nowrap">${f.size ? (f.size/1024).toFixed(1)+'KB' : ''}</span>
            <button class="dl-btn" onclick="downloadFile('${f.key}')">↓</button>
            <button class="del-btn" onclick="deleteFile('${f.key}')">✕</button>`;
          ul.appendChild(li);
        }
      } catch(e) { $('file-list').innerHTML = `<li style="color:var(--error)">${e.message}</li>`; }
    }

    // Upload
    $('btn-upload').onclick = async () => {
      const file = $('upload-input').files[0];
      if (!file) { log('log-upload','Select a file first','err'); return; }
      const form = new FormData();
      form.append('file', file);
      try {
        log('log-upload','Uploading…');
        const r = await fetch(`${API}/upload`, { method:'POST', body:form });
        const d = await r.json();
        log('log-upload', JSON.stringify(d, null, 2), 'ok');
        listFiles();
      } catch(e) { log('log-upload', e.message, 'err'); }
    };

    // Presign
    $('btn-presign').onclick = async () => {
      try {
        const r = await fetch(`${API}/presign-upload`);
        const d = await r.json();
        log('log-presign', JSON.stringify(d, null, 2), 'ok');
      } catch(e) { log('log-presign', e.message, 'err'); }
    };

    // Download
    async function downloadFile(key) {
      try {
        const r = await fetch(`${API}/download/${encodeURIComponent(key)}`);
        const d = await r.json();
        window.open(d.url, '_blank');
      } catch(e) { alert(e.message); }
    }

    // Delete
    async function deleteFile(key) {
      try {
        await fetch(`${API}/${encodeURIComponent(key)}`, { method:'DELETE' });
        listFiles();
      } catch(e) { alert(e.message); }
    }

    $('btn-health').onclick = health;
    $('btn-list').onclick = listFiles;

    // Auto-run on load
    health();
    listFiles();
  </script>
</body>
</html>
