<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kora | Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --card-bg: rgba(255, 255, 255, 0.03);
            --accent: #bb86fc;
            --secondary: #03dac6;
            --text: #e0e0e0;
            --text-dim: #a0a0a0;
            --error: #cf6679;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .auth-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            padding: 3rem;
            border-radius: 32px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 2rem;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(135deg, var(--accent) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            background: rgba(255, 255, 255, 0.02);
            padding: 0.5rem;
            border-radius: 12px;
        }

        .tab {
            flex: 1;
            padding: 0.75rem;
            text-align: center;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s;
            color: var(--text-dim);
        }

        .tab.active {
            background: rgba(187, 134, 252, 0.15);
            color: var(--accent);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
        }

        button {
            width: 100%;
            padding: 1rem;
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            margin-top: 1rem;
        }

        button:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.98);
        }

        #message {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
            display: none;
        }

        .error { background: rgba(207, 102, 121, 0.1); color: var(--error); border: 1px solid var(--error); }
        .success { background: rgba(3, 218, 198, 0.1); color: var(--secondary); border: 1px solid var(--secondary); }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1 id="title">Welcome to Kora</h1>
        
        <div class="tabs">
            <div class="tab active" onclick="setMode('signin')">Login</div>
            <div class="tab" onclick="setMode('signup')">Sign Up</div>
        </div>

        <form id="authForm">
            <div class="form-group" id="nameGroup" style="display: none;">
                <label>Display Name</label>
                <input type="text" id="name" placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" id="submitBtn">Login</button>
        </form>

        <div id="message"></div>
        <div style="text-align: center; margin-top: 2rem;">
            <a href="index.html" style="color: var(--text-dim); text-decoration: none; font-size: 0.85rem;">← Back to Home</a>
        </div>
    </div>

    <script>
        let mode = 'signin';

        function setMode(newMode) {
            mode = newMode;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('title').textContent = mode === 'signin' ? 'Welcome Back' : 'Create Account';
            document.getElementById('submitBtn').textContent = mode === 'signin' ? 'Login' : 'Create Account';
            document.getElementById('nameGroup').style.display = mode === 'signin' ? 'none' : 'block';
            document.getElementById('message').style.display = 'none';
        }

        document.getElementById('authForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value;
            const msg = document.getElementById('message');
            const btn = document.getElementById('submitBtn');

            msg.style.display = 'none';
            btn.disabled = true;
            btn.style.opacity = '0.5';

            try {
                const endpoint = mode === 'signin' ? '/api/auth/sign-in/email' : '/api/auth/sign-up/email';
                const body = mode === 'signin' 
                    ? { email, password } 
                    : { email, password, name };

                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await response.json();

                if (response.ok) {
                    msg.textContent = mode === 'signin' ? 'Logged in successfully!' : 'Account created!';
                    msg.className = 'success';
                    msg.style.display = 'block';
                    setTimeout(() => window.location.href = 'onboarding.html', 1000);
                } else {
                    throw new Error(data.message || 'Authentication failed');
                }
            } catch (err) {
                msg.textContent = err.message;
                msg.className = 'error';
                msg.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.style.opacity = '1';
            }
        };
    </script>
</body>
</html>
